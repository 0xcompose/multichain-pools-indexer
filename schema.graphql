enum DexProtocol {
	UniswapV2
	UniswapV3
	UniswapV4
	PancakeSwapInfinity
	AlgebraIntegral
	Curve
	BalancerV2
	BalancerV3
	VelodromeSlipstreamCL
	VelodromeCPMM
}

type Token {
	id: ID!
	chainId: Int! @index
	address: String! @index
	poolCount: Int!
	poolTokens: [PoolToken!]! @derivedFrom(field: "token")
}

type Pool {
	id: ID!
	chainId: Int! @index
	address: String! @index
	protocol: DexProtocol!
	creatorContract: String!
	poolTokens: [PoolToken!]! @derivedFrom(field: "pool")
	# creationTxHash: String!
	createdAt: Int!
	createdAtBlock: Int!
}

type PoolToken {
	id: ID!
	pool: Pool! @index
	token: Token! @index
	tokenIndex: Int!
}

### POOL IMMUTABLES ###

# UniswapV2 doesn't have any valuable immutables

type UniswapV3PoolImmutables {
	id: ID!
	fee: BigInt!
	tickSpacing: BigInt!
}

type UniswapV4PoolImmutables {
	id: ID!
	fee: BigInt!
	tickSpacing: BigInt!
	hooks: String!
}

type PancakeSwapInfinityPoolImmutables {
	id: ID!
	hooks: String!
	fee: BigInt!
	parameters: String!
}

type BalancerV2PoolImmutables {
	id: ID!
	specialization: String!
}

type BalancerV3PoolImmutables {
	id: ID!
	factory: String!
	swapFeePercentage: BigInt!
}

type AlgebraIntegralPoolImmutables {
	id: ID!
	deployer: String
	tickSpacing: BigInt
}

type VelodromeSlipstreamCLPoolImmutables {
	id: ID!
	tickSpacing: BigInt!
}

type VelodromeCPMMPoolImmutables {
	id: ID!
	stable: Boolean!
}

### METRICS ###

type ChainMetrics {
	id: ID!
	chainId: Int! @index
	totalPools: Int!
	totalTokens: Int!
}

type PoolsProtocolDistributionMetrics {
	id: ID!
	chainId: Int! @index
	protocol: DexProtocol!
	poolCount: Int!
}
