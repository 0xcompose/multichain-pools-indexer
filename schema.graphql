### METRICS ###

type ChainMetrics {
	id: ID!
	chainId: Int! @index
	totalPools: Int!
	totalTokens: Int!
}

type PoolsProtocolDistributionMetrics {
	id: ID!
	chainId: Int! @index
	protocol: DexProtocol!
	poolCount: Int!
}
