# Postgres + Hasura + indexer (same layout as Envio codegen’s docker-compose).
# Usage: docker compose up --build
# Network is project-scoped (no fixed global name) to avoid stale Docker network errors.
services:
  envio-postgres:
    image: postgres:17.5
    restart: always
    ports:
      - "${ENVIO_PG_PORT:-5433}:5432"

    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ENVIO_PG_PASSWORD:-testing}
      POSTGRES_USER: ${ENVIO_PG_USER:-postgres}
      POSTGRES_DB: ${ENVIO_PG_DATABASE:-envio-dev}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ENVIO_PG_USER:-postgres} -d ${ENVIO_PG_DATABASE:-envio-dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - my-proxy-net

  graphql-engine:
    image: hasura/graphql-engine:v2.43.0
    ports:
      - "${HASURA_EXTERNAL_PORT:-8080}:8080"
    user: 1001:1001
    depends_on:
      envio-postgres:
        condition: service_healthy
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${ENVIO_PG_USER:-postgres}:${ENVIO_PG_PASSWORD:-testing}@envio-postgres:5432/${ENVIO_PG_DATABASE:-envio-dev}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true}
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_NO_OF_RETRIES: 10
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-testing}
      HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
      PORT: 8080
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    healthcheck:
      test: timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1
      interval: 5s
      timeout: 2s
      retries: 50
      start_period: 5s
    networks:
      - my-proxy-net

  indexer:
    build: .
    restart: on-failure
    ports:
      # Envio Console (https://envio.dev) reads indexer state from the browser via this port (/console/state, /metrics)
      - "${ENVIO_INDEXER_PORT:-9898}:${ENVIO_INDEXER_PORT:-9898}"
    depends_on:
      envio-postgres:
        condition: service_healthy
      graphql-engine:
        condition: service_healthy
    environment:
      ENVIO_PG_HOST: envio-postgres
      ENVIO_PG_PORT: "5432"
      ENVIO_PG_USER: ${ENVIO_PG_USER:-postgres}
      ENVIO_PG_PASSWORD: ${ENVIO_PG_PASSWORD:-testing}
      ENVIO_PG_DATABASE: ${ENVIO_PG_DATABASE:-envio-dev}
      ENVIO_INDEXER_PORT: ${ENVIO_INDEXER_PORT:-9898}
      TUI_OFF: "false"
      # Inside the container, localhost is not Hasura — use the compose service name
      HASURA_GRAPHQL_ENDPOINT: http://graphql-engine:8080/v1/metadata
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-testing}
    networks:
      - my-proxy-net

volumes:
  db_data:

networks:
  my-proxy-net:
    driver: bridge
